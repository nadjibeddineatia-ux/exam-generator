kind = "web"
previewPath = "/"
title = "AI Study Kit Generator"
version = "1.0.0"
id = "artifacts/study-kit"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 22132
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/study-kit run dev"

[services.env]
PORT = "22132"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/study-kit", "run", "build"]
publicDir = "artifacts/study-kit/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
